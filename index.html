<!DOCTYPE html>
<html>
<head>
    <title>My Advanced GitHub Deploy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🚀 My Deployed Website</h1>

    <!-- Dark Mode Toggle -->
    <button onclick="toggleMode()">Toggle Dark Mode</button>

    <!-- Digital Clock -->
    <h2 id="clock"></h2>

    <!-- To-Do Section -->
    <div class="todo">
        <h3>📝 My To-Do List</h3>
        <input type="text" id="taskInput" placeholder="Enter task">
        <button onclick="addTask()">Add</button>
        <ul id="taskList"></ul>
    </div>

    <footer>
        <p>Made by Balaji | Hosted on GitHub Pages</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
