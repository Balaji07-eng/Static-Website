
<!DOCTYPE html>
<html>
<head>
    <title>Smart Productivity Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🚀 Smart Productivity Dashboard</h1>

        <button onclick="toggleMode()" class="toggle-btn">Toggle Dark Mode</button>

        <h2 id="clock"></h2>

        <div class="todo-section">
            <h3>📝 Task Manager</h3>
            <input type="text" id="taskInput" placeholder="Enter task">
            <button onclick="addTask()">Add Task</button>

            <p>Total Tasks: <span id="taskCount">0</span></p>

            <ul id="taskList"></ul>
        </div>
    </div>

    <footer>
        <p>© 2026 Balaji | Hosted on GitHub Pages</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
